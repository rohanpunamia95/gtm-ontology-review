<template>
    <div class="page-shell">

        <!-- ── Page header (plain, like the original) ──────────────────── -->
        <div class="page-head">
            <div class="page-head-left">
                <nav role="navigation" aria-label="Breadcrumbs">
                    <ol class="slds-breadcrumb slds-list_horizontal slds-wrap">
                        <li class="slds-breadcrumb__item"><a href="#" onclick={noop}>Agent Studio</a></li>
                        <li class="slds-breadcrumb__item"><span>Agent Grounding</span></li>
                    </ol>
                </nav>
                <div class="title-row">
                    <h1 class="page-title">Agent Grounding</h1>
                    <span class="auto-badge">
                        <lightning-icon icon-name="utility:sparkles" size="xx-small"></lightning-icon>
                        Auto-learned
                    </span>
                </div>
                <p class="header-sub">
                    Everything here was learned by your agent from your calls, emails, CRM, and website — and keeps
                    updating as new deals close. Review it and edit anything; this is a living repository.
                </p>
                <p class="header-prov">
                    {customer} · <b>{meta.callsAnalyzed}</b> sales calls · <b>{meta.emailsAnalyzed}</b> emails ·
                    <b>{meta.pagesAnalyzed}</b> web pages · <b>{meta.dealsAnalyzed}</b> closed-won deals ·
                    Last extracted {extractedAt}
                </p>
            </div>
            <div class="page-head-actions">
                <lightning-button
                    label="Re-run extraction"
                    icon-name="utility:refresh"
                    variant="neutral"
                    onclick={handleRerun}>
                </lightning-button>
            </div>
        </div>

        <!-- ── Body: rail + content ────────────────────────────────────── -->
        <div class="body-grid">

            <!-- Products rail -->
            <div class="rail-col">
                <div class="rail-box">
                    <nav class="slds-nav-vertical rail-nav" aria-label="Products">
                        <div class="slds-nav-vertical__section">
                            <h2 class="slds-nav-vertical__title rail-title">Products</h2>
                            <ul aria-describedby="products">
                                <template for:each={products} for:item="p">
                                    <li key={p.id} class={p.itemClass}>
                                        <a href="#" class="slds-nav-vertical__action rail-action" data-id={p.id} onclick={handleProductSelect}>
                                            <span class="rail-label">{p.name}</span>
                                            <span class="rail-count">{p.count}</span>
                                        </a>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </nav>
                </div>
            </div>

            <!-- Content -->
            <div class="content-col">

                <!-- Card: product name + tabs only -->
                <div class="tabs-card">
                    <h2 class="motion-name">{selName}</h2>
                    <div class="slds-tabs_default">
                        <ul class="slds-tabs_default__nav tabs-nav" role="tablist">
                            <template for:each={tabs} for:item="t">
                                <li key={t.key} class={t.itemClass} title={t.label} role="presentation">
                                    <a class="slds-tabs_default__link" href="#" role="tab"
                                       tabindex={t.tabIndex} aria-selected={t.ariaSelected}
                                       data-tab={t.key} onclick={handleTabSelect}>
                                        {t.label}&nbsp;<span class="tab-count">{t.count}</span>
                                    </a>
                                </li>
                            </template>
                        </ul>
                    </div>
                </div>

                <!-- Tab body, on the page background like the original -->
                <div class="tab-body">

                    <!-- ICP tab: stacked segment sections -->
                    <template lwc:if={isIcpTab}>
                        <template for:each={icpSections} for:item="seg">
                            <div key={seg.id} class="icp-section">
                                <h3 class="seg-name">{seg.name}</h3>
                                <template lwc:if={seg.defId}>
                                    <div class="def-box" data-id={seg.defId} onclick={handleDefOpen}>
                                        <div class="def-main">
                                            <div class="overline">Segment definition</div>
                                            <div class="def-value">{seg.defText}</div>
                                            <div class="def-sub">{seg.defSub}</div>
                                        </div>
                                        <lightning-button-icon icon-name="utility:edit" variant="bare" size="small"
                                            alternative-text="Edit definition" data-id={seg.defId}
                                            onclick={handleDefEdit}></lightning-button-icon>
                                    </div>
                                </template>
                                <template lwc:if={seg.hasRows}>
                                    <ui-grounding-table columns={icpColumns} rows={seg.rows}
                                        onrowopen={handleIcpOpen} onrowedit={handleIcpEdit}></ui-grounding-table>
                                </template>
                                <template lwc:else>
                                    <div class="empty-box">
                                        <div class="empty-title">Not enough closed-won deals to infer a sweet spot</div>
                                        <div class="empty-sub">{seg.emptyText}</div>
                                    </div>
                                </template>
                                <div class="add-row-wrap">
                                    <lightning-button label="Add row" icon-name="utility:add" variant="base"
                                        data-seg={seg.id} onclick={handleAddIcp}></lightning-button>
                                </div>
                            </div>
                        </template>

                        <template lwc:if={hasPoorFit}>
                            <div class="icp-section">
                                <h3 class="seg-name poor-fit-title">
                                    <lightning-icon icon-name="utility:ban" size="x-small" class="ban-icon"></lightning-icon>
                                    Poor fit · shared across segments
                                </h3>
                                <ui-grounding-table columns={icpColumns} rows={poorFitRows}
                                    onrowopen={handleIcpOpen} onrowedit={handleIcpEdit}></ui-grounding-table>
                                <div class="add-row-wrap">
                                    <lightning-button label="Add row" icon-name="utility:add" variant="base"
                                        data-seg="poor_fit" onclick={handleAddIcp}></lightning-button>
                                </div>
                            </div>
                        </template>
                    </template>

                    <!-- Standard tabs -->
                    <template lwc:else>
                        <p class="row-count">{rowCountLabel}</p>
                        <ui-grounding-table columns={tableColumns} rows={tableRows}
                            onrowopen={handleRowOpen} onrowedit={handleRowEdit}></ui-grounding-table>
                        <div class="add-row-wrap">
                            <lightning-button label={addLabel} icon-name="utility:add" variant="base"
                                onclick={handleAddRow}></lightning-button>
                        </div>
                    </template>

                </div>
            </div>
        </div>

        <!-- ── Editor drawer (custom, mirrors the original) ────────────── -->
        <template lwc:if={editor}>
            <div class="drawer-backdrop" onclick={closeEditor}></div>
            <section class="drawer-panel" aria-hidden="false">
                <div class="drawer-header">
                    <div class="drawer-header-main">
                        <div class="overline">{drawerCategory}</div>
                        <h2 class="drawer-title" title={drawerTitle}>{drawerTitle}</h2>
                        <template lwc:if={drawerChips}>
                            <div class="drawer-chips">
                                <span class={drawerChips.confClass}>{drawerChips.confText}</span>
                                <span class="claim-text">{drawerChips.claim}</span>
                            </div>
                        </template>
                    </div>
                    <lightning-button-icon icon-name="utility:close" variant="bare" size="medium"
                        alternative-text="Close" onclick={closeEditor}></lightning-button-icon>
                </div>

                <div class="drawer-body">
                    <!-- Edit / create form -->
                    <template lwc:if={isEditing}>
                        <template lwc:if={showCategoryPicker}>
                            <lightning-combobox label="Category" value={drawerCategory}
                                options={categoryOptions} onchange={handleCategoryChange}
                                class="field-gap"></lightning-combobox>
                        </template>
                        <template for:each={editFields} for:item="f">
                            <div key={f.key} class="field-gap">
                                <template lwc:if={f.isArea}>
                                    <lightning-textarea label={f.label} value={f.value} placeholder={f.placeholder}
                                        data-key={f.key} onchange={handleFieldChange}></lightning-textarea>
                                </template>
                                <template lwc:elseif={f.isNumber}>
                                    <lightning-input type="number" label={f.label} value={f.value}
                                        data-key={f.key} onchange={handleFieldChange}></lightning-input>
                                </template>
                                <template lwc:else>
                                    <lightning-input label={f.label} value={f.value}
                                        data-key={f.key} onchange={handleFieldChange}></lightning-input>
                                </template>
                            </div>
                        </template>
                    </template>

                    <!-- View facts + sources -->
                    <template lwc:else>
                        <template for:each={viewFacts} for:item="fact">
                            <div key={fact.key} class="fact-row">
                                <div class="fact-label">{fact.label}</div>
                                <template lwc:if={fact.isList}>
                                    <ul class="fact-list">
                                        <template for:each={fact.items} for:item="it">
                                            <li key={it} class="fact-text fact-li">{it}</li>
                                        </template>
                                    </ul>
                                </template>
                                <template lwc:else>
                                    <div class="fact-text">{fact.text}</div>
                                </template>
                            </div>
                        </template>

                        <template lwc:if={hasSources}>
                            <div class="sources-block">
                                <div class="overline">{sourceCountLabel}</div>
                                <template for:each={viewSources} for:item="s">
                                    <div key={s.id} class="source-row">
                                        <div class="source-head">
                                            <span class="source-label">{s.label}</span>
                                            <span class="source-when">{s.when}</span>
                                        </div>
                                        <div class="source-snippet">{s.snippet}</div>
                                        <div class="source-ref">{s.type} · {s.ref}</div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </template>
                </div>

                <footer class="drawer-footer">
                    <template lwc:if={isEditing}>
                        <template lwc:if={isCreate}>
                            <span></span>
                        </template>
                        <template lwc:else>
                            <lightning-button label="Delete" variant="destructive-text" onclick={handleDelete}></lightning-button>
                        </template>
                        <span class="footer-spacer"></span>
                        <lightning-button label="Cancel" variant="neutral" class="btn-gap" onclick={closeEditor}></lightning-button>
                        <lightning-button label="Save" variant="brand" onclick={handleSave}></lightning-button>
                    </template>
                    <template lwc:else>
                        <lightning-button label="Delete" variant="destructive-text" onclick={handleDelete}></lightning-button>
                        <span class="footer-spacer"></span>
                        <lightning-button label="Edit" variant="neutral" icon-name="utility:edit" onclick={switchToEdit}></lightning-button>
                    </template>
                </footer>
            </section>
        </template>

        <!-- ── Toast ───────────────────────────────────────────────────── -->
        <template lwc:if={toast}>
            <div class="slds-notify_container slds-is-fixed">
                <div class={toast.cls} role="status">
                    <div class="slds-notify__content">
                        <h2 class="slds-text-heading_small">{toast.title}</h2>
                        <template lwc:if={toast.body}>
                            <p class="slds-text-body_small">{toast.body}</p>
                        </template>
                    </div>
                    <div class="slds-notify__close">
                        <lightning-button-icon icon-name="utility:close" variant="bare-inverse"
                            alternative-text="Dismiss" onclick={dismissToast}></lightning-button-icon>
                    </div>
                </div>
            </div>
        </template>

    </div>
</template>
