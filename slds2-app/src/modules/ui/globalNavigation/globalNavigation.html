<template>
    <div class={contextBarClass}>
        <div class="slds-context-bar__primary">
            <div
                class={waffleDropdownTriggerClass}
                role="presentation">
                <div class="slds-context-bar__icon-action">
                    <lightning-dynamic-icon
                        type="waffle"
                        alternative-text="Application launcher"
                        onclick={handleWaffleOpen}>
                    </lightning-dynamic-icon>
                </div>
                <div
                    class="slds-dropdown slds-dropdown_left"
                    role="menu"
                    aria-label="App Launcher"
                    lwc:if={isWaffleMenuOpen}
                    onkeydown={handleWaffleMenuKeydown}>
                    <ul class="slds-dropdown__list" role="group">
                        <template for:each={appItemsWithCurrent} for:item="item">
                            <li key={item.id} class="slds-dropdown__item" role="presentation">
                                <a
                                    href={item.href}
                                    role="menuitem"
                                    tabindex="-1"
                                    aria-current={item.ariaCurrent}
                                    data-value={item.id}
                                    onclick={handleWaffleMenuItemClick}>
                                    <span class="slds-truncate" title={item.label}>{item.label}</span>
                                </a>
                            </li>
                        </template>
                    </ul>
                </div>
                <span class="slds-context-bar__label-action slds-context-bar__app-name">
                    <span class="slds-truncate" title={currentAppLabel}>{currentAppLabel}</span>
                </span>
            </div>

            <template lwc:if={isConsole}>
                <div class={objectSwitcherTabClass}>
                    <button
                        class="slds-context-bar__label-action"
                        role="tab"
                        aria-selected={mainTabAriaSelected}
                        title={currentPageLabel}>
                        <span class="slds-truncate" title={currentPageLabel}>{currentPageLabel}</span>
                    </button>
                </div>
                <div class={objectSwitcherChevronClass} role="presentation">
                    <lightning-button-icon
                        class="slds-m-horizontal_xx-small"
                        icon-name="utility:chevrondown"
                        variant="container"
                        alternative-text="Open object switcher menu"
                        aria-haspopup="true"
                        onclick={handleObjectSwitcherToggle}>
                    </lightning-button-icon>
                    <div
                        class="slds-dropdown slds-dropdown_left"
                        lwc:if={isObjectSwitcherOpen}
                        onkeydown={handleObjectSwitcherKeydown}>
                        <div
                            class="slds-dropdown__list"
                            role="menu"
                            onprivateselect={handleObjectSwitcherSelect}>
                            <template for:each={pagesInCurrentApp} for:item="item">
                                <lightning-menu-item
                                    key={item.page}
                                    label={item.label}
                                    value={item.page}>
                                </lightning-menu-item>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <template lwc:if={isStandard}>
            <nav class="slds-context-bar__secondary" role="navigation" aria-label="App navigation">
                <ul class="slds-grid slds-container_fluid">
                    <template for:each={navItemsWithActive} for:item="item">
                        <li key={item.page} class={item.tabClass}>
                            <a
                                href={item.href}
                                class="slds-context-bar__label-action"
                                title={item.label}
                                aria-current={item.ariaCurrent}
                                data-page={item.page}
                                onclick={handleNavItemClick}>
                                <span class="slds-assistive-text" lwc:if={item.isActive}>Current Page:</span>
                                <span class="slds-truncate" title={item.label}>{item.label}</span>
                            </a>
                        </li>
                    </template>
                </ul>
            </nav>
        </template>
        <template lwc:elseif={isConsole}>
            <div class="slds-context-bar__secondary" role="presentation">
                <div class="slds-context-bar__vertical-divider"></div>
                <!-- Workspace tab strip will live here in a follow-up pass. -->
            </div>
        </template>
    </div>
</template>
