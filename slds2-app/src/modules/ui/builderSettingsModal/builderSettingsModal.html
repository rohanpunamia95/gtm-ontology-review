<template>
    <lightning-modal-header label="Page Settings"></lightning-modal-header>
    <lightning-modal-body>
        <lightning-input
            label="Page Name"
            value={inputValue}
            placeholder="Untitled Page"
            onchange={handleNameChange}>
        </lightning-input>
    </lightning-modal-body>
    <lightning-modal-footer>
        <lightning-button
            label="Cancel"
            variant="neutral"
            onclick={handleCancel}
            title="Cancel">
        </lightning-button>
        <lightning-button
            label="Save"
            variant="brand"
            onclick={handleSave}
            title="Save"
            class="slds-m-left_x-small">
        </lightning-button>
    </lightning-modal-footer>
</template>
